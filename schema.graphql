type UsdcTransfer @entity {
  id: ID!
  block: Int!
  from: String! @index
  to: String! @index
  value: BigInt!
  chainId: Int!
  txnHash: String! @index
}

type Account @entity {
  id: ID!
  account: String! @index
  owner: String! @index
  operator: String! @index
  salt: BigInt!
  block: Int!
  chainId: Int!
  txnHash: String! @index
}
