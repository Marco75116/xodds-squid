type Account @entity {
  id: ID!
  account: String! @index
  owner: String! @index
  operator: String! @index
  salt: BigInt!
  block: Int!
  chainId: Int!
  txnHash: String! @index
}

type Withdrawal @entity {
  id: ID!
  account: String! @index
  token: String! @index
  to: String! @index
  amount: BigInt!
  block: Int!
  chainId: Int!
  txnHash: String! @index
}

type VaultConfig @entity {
  id: ID!
  account: String! @index
  owner: String! @index
  tokens: [String!]!
  allocations: [String!]!
  dcaAmount: BigInt!
  dcaFrequency: BigInt!
  block: Int!
  chainId: Int!
  txnHash: String! @index
}
